parameters:
  - name: workingDirectory
    type: string
  - name: env
    type: string
  - name: autoApprove
    type: boolean
    default: false
  - name: force
    type: boolean
    default: false

steps:
  - script: |
      echo Deploy bundle via Databricks CLI...
      DEPLOY_CMD="databricks bundle deploy -t $(env)"
      
      if [ ${{ parameters.autoApprove }} = "True" ]; then
        echo "Auto-approve enabled"
        DEPLOY_CMD="$DEPLOY_CMD --auto-approve"
      fi
      
      if [ ${{ parameters.force }} = "True" ]; then
        echo "Force deployment enabled"
        DEPLOY_CMD="$DEPLOY_CMD --force"
      fi
      
      echo "Running: $DEPLOY_CMD"
      $DEPLOY_CMD
    workingDirectory: "$(System.DefaultWorkingDirectory)/${{ parameters.workingDirectory }}"
    displayName: Deploy job on ${{ parameters.env }} environment
