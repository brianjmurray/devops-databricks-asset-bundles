parameters:
  - name: workingDirectory
    type: string

steps:
- script: |
    echo "Checking for unit tests in ${{ parameters.workingDirectory }}/tests/ directory..."
    PROJECT_ROOT="$(System.DefaultWorkingDirectory)/${{ parameters.workingDirectory }}"
    cd "$PROJECT_ROOT"
    
    if [ -d "tests" ] && [ "$(find tests -name 'test_*.py' -o -name '*_test.py' | wc -l)" -gt 0 ]; then
      echo "##vso[task.setvariable variable=TestsExist]true"
      echo "Found test files in $PROJECT_ROOT/tests/"
      echo "Running pytest..."
      python -m pytest tests/ -v --junitxml=test-results.xml --cov=. --cov-report=xml --cov-report=html
      TEST_EXIT_CODE=$?
      if [ $TEST_EXIT_CODE -ne 0 ]; then
        echo "##vso[task.logissue type=error]Unit tests failed with exit code $TEST_EXIT_CODE"
        exit $TEST_EXIT_CODE
      fi
      echo "All unit tests passed!"
    else
      echo "##vso[task.setvariable variable=TestsExist]false"
      echo "No unit tests found in $PROJECT_ROOT/tests/ directory. Skipping test execution."
      echo "To add tests, create a 'tests/' directory in your project root and add test files matching 'test_*.py' or '*_test.py' patterns."
    fi
  displayName: 'Run Unit Tests'

- task: PublishTestResults@2
  condition: and(succeededOrFailed(), eq(variables['TestsExist'], 'true'))
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: '**/test-results.xml'
    mergeTestResults: true
    failTaskOnFailedTests: true
    testRunTitle: 'Python Unit Tests'
  displayName: 'Publish Test Results'

- task: PublishCodeCoverageResults@1
  condition: and(succeededOrFailed(), eq(variables['TestsExist'], 'true'))
  inputs:
    codeCoverageTool: 'Cobertura'
    summaryFileLocation: '$(System.DefaultWorkingDirectory)/${{ parameters.workingDirectory }}/coverage.xml'
    reportDirectory: '$(System.DefaultWorkingDirectory)/${{ parameters.workingDirectory }}/htmlcov'
  displayName: 'Publish Code Coverage'
